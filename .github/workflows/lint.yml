name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: shellcheck
        uses: reviewdog/action-shellcheck@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
          shellcheck_flags: --enable=all
          pattern: |
            custodian
            dns-updater
            event-emitter
            task-reaper
  shfmt:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: shfmt
        uses: reviewdog/action-shfmt@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          filter_mode: file
          shfmt_flags: -i 2
  golangci-lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@v2
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  prettier:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: create package.json
        # Pinned exact (not a floating ^range): a prettier minor bump must not
        # silently reformat the tree out from under contributors. Markdown is
        # excluded from prettier via .prettierignore — mdformat owns it.
        run: |
          echo -e '{"devDependencies": {"prettier": "3.3.3"}}' > package.json
      - name: prettier
        uses: EPMatt/reviewdog-action-prettier@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  misspell:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: misspell
        uses: reviewdog/action-misspell@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          exclude: |
            ./.git/*
            ./.cache/*
  alex:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: alex
        uses: reviewdog/action-alex@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          alex_flags: |
            * .github/* .github/workflows/*
  markdownlint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: markdownlint
        uses: reviewdog/action-markdownlint@v0
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: none
          filter_mode: file
          markdownlint_flags: |
            --disable MD033 -- .
  hadolint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: hadolint
        uses: reviewdog/action-hadolint@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  actionlint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          github_token: ${{ github.token }}
          reporter: github-pr-review
          fail_level: error
          filter_mode: file
  mdformat:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # mdformat (0.7.17) is the org's authoritative markdown formatter — prettier
      # is excluded from markdown via .prettierignore. This repo has no pre-commit
      # framework, so this CI check is what enforces mdformat-clean markdown.
      - name: mdformat --check
        run: |
          python3 -m pip install --quiet 'mdformat==0.7.17'
          python3 -m mdformat --check .
